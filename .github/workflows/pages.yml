name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "viz/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r viz/* _site/
          # Investor brief SPA at site root; shared assets live beside index.html
          cp viz/sites/index.html _site/index.html
          cp -r viz/sites/shared _site/shared
          # Classic hub landing remains at /landing.html
          cp viz/landing.html _site/landing.html
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
